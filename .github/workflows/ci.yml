name: AMT CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACK4APP_APP_ID: ${{ secrets.NEXT_PUBLIC_BACK4APP_APP_ID }}
          NEXT_PUBLIC_BACK4APP_JS_KEY: ${{ secrets.NEXT_PUBLIC_BACK4APP_JS_KEY }}
          NEXT_PUBLIC_BACK4APP_SERVER_URL: https://parseapi.back4app.com
          NEXT_PUBLIC_BACK4APP_LIVE_QUERY_URL: ${{ secrets.NEXT_PUBLIC_BACK4APP_LIVE_QUERY_URL }}
